[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
# E/W: pycodestyle, F: pyflakes, I: isort, UP: pyupgrade, B: bugbear
select = ["E", "W", "F", "I", "UP", "B"]
# E501 (satır uzunluğu) Türkçe yorumlarda gürültü yaratıyor; formatlayıcı zaten halleder.
ignore = ["E501", "B008"]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["E402"]
"scripts/build_rag.py" = ["E402"]
