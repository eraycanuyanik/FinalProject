# Anlattım — local-only Turkish contract analyzer.
# `docker compose up` brings up: backend (FastAPI), frontend (Next.js), chromadb.
# The LLM is NOT a container: it is LM Studio running on the host at :1234,
# reached from containers via host.docker.internal.

services:
  backend:
    build:
      context: ./backend
    container_name: anlattim-backend
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      # LLM çağrıları LiteLLM proxy üzerinden geçer (token + maliyet takibi için).
      LLM_BASE_URL: ${LLM_BASE_URL:-http://litellm:4000/v1}
      LLM_API_KEY: ${LLM_API_KEY:-sk-anlattim-master}
      LLM_MODEL: ${LLM_MODEL:-qwen2.5-coder-7b-instruct-mlx}
      LLM_REQUEST_TIMEOUT: ${LLM_REQUEST_TIMEOUT:-300}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-intfloat/multilingual-e5-large}
      HF_HOME: /app/hf_cache
      CHROMA_HOST: chromadb
      CHROMA_PORT: 8000
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
    volumes:
      - ./backend:/app
      - hf_cache:/app/hf_cache
      - ./data:/data
    # Lets the container resolve host.docker.internal on Linux too (Docker Desktop
    # already provides it on macOS/Windows, but this makes it explicit/portable).
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - chromadb
      - litellm

  frontend:
    build:
      context: ./frontend
    container_name: anlattim-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend

  chromadb:
    image: chromadb/chroma:0.5.23
    container_name: anlattim-chromadb
    ports:
      - "8001:8000"
    volumes:
      - ./data/chroma:/chroma/chroma
    environment:
      IS_PERSISTENT: "TRUE"
      ANONYMIZED_TELEMETRY: "FALSE"

  # LiteLLM proxy: tüm LLM çağrılarını host LM Studio'ya yönlendirir, token sayar,
  # (sahte GPT-4o tarifesiyle) maliyet hesaplar. Dashboard: http://localhost:4000/ui
  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    container_name: anlattim-litellm
    ports:
      - "4000:4000"
    volumes:
      - ./litellm/config.yaml:/app/config.yaml
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    environment:
      LITELLM_MASTER_KEY: sk-anlattim-master
      DATABASE_URL: "postgresql://litellm:litellm@litellm-db:5432/litellm"
      STORE_MODEL_IN_DB: "True"
      UI_USERNAME: ${LITELLM_UI_USERNAME:-admin}
      UI_PASSWORD: ${LITELLM_UI_PASSWORD:-anlattim}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - litellm-db

  litellm-db:
    image: postgres:16-alpine
    container_name: anlattim-litellm-db
    environment:
      POSTGRES_USER: litellm
      POSTGRES_PASSWORD: litellm
      POSTGRES_DB: litellm
    volumes:
      - litellm_db:/var/lib/postgresql/data

volumes:
  hf_cache:
  litellm_db:
